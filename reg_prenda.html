<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleStock — Registrar Prenda</title>
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="reg_prenda.css">
<link rel="icon" type="image/svg+xml" href="Gemini_Generated_Image_kxv9nskxv9nskxv9.png">
</head>
<body>

 <svg style="display:none">
  <defs>
    <filter id="deuteranopia">
      <feColorMatrix type="matrix" values="0.625 0.375 0 0 0
                                            0.7   0.3   0 0 0
                                            0     0.3   0.7 0 0
                                            0     0     0   1 0"/>
    </filter>
  </defs>
</svg>




<div class="orb-bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="grid-overlay"></div>
</div>

<div class="page">

  <div class="header">
    <img src="logo_text.png" class="brand-img" alt="StyleStock">
    <h1 class="title">Registrar Prenda</h1>
  </div>

  <div class="form-card">

    <!-- IMAGEN -->
    <div class="img-upload-area" onclick="document.getElementById('imagen').click()">
      <div class="img-placeholder">
        <span>📷</span>
        Haz clic para subir una imagen
      </div>
      <img id="preview" src="" alt="Preview">
      <input id="imagen" type="file" accept="image/*" style="display:none;">
    </div>

    <form id="formPrenda">

      <div class="form-group">
        <label for="nombre">Nombre de la prenda</label>
        <input id="nombre" type="text" placeholder="Ej: Camisa de cuello" required>
      </div>

      <div class="form-group">
        <label for="categoria">Categoría</label>
        <select id="categoria">
          <option value="">Selecciona categoría</option>
          <option>Camisas</option>
          <option>Pantalones</option>
          <option>Vestidos</option>
          <option>Abrigos</option>
          <option>Zapatos</option>
        </select>
      </div>

      <div class="form-group">
        <label for="color">Color</label>
        <input id="color" type="text" placeholder="Ej: Rojo, Azul marino...">
      </div>

      <div>
        <p class="sizes-label">Talla</p>
        <div class="sizes" id="sizes"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="precio">Precio ($)</label>
          <input id="precio" type="number" placeholder="45000" required>
        </div>
        <div class="form-group">
          <label>Cantidad</label>
          <div class="qty-control">
            <button type="button" id="menos">−</button>
            <input id="cantidad" type="number" value="1" min="1" required>
            <button type="button" id="mas">+</button>
          </div>
        </div>
      </div>

      <button type="submit" id="submitBtn">Guardar prenda</button>

    </form>

    <p class="btn-back-link" onclick="volver()">← Volver al inventario</p>

  </div>

</div>



<!-- ACCESIBILIDAD -->
<button class="btn-accesibilidad" onclick="toggleAccesibilidad()">♿</button>

<div id="panelAccesibilidad" class="panel-accesibilidad" style="display:none;">
  
  <h3>Accesibilidad</h3>

  <div class="acc-seccion">
    <p class="acc-label">Tamaño de texto</p>
    <div class="acc-fila">
      <button onclick="cambiarTexto(-1)">A−</button>
      <button onclick="cambiarTexto(0)">A</button>
      <button onclick="cambiarTexto(1)">A+</button>
    </div>
  </div>

    <div class="acc-seccion">
      <p class="acc-label">Modo de color</p>
      <div class="acc-fila">
        <button onclick="aplicarFiltro('')">Normal</button>
        <button onclick="aplicarFiltro('deuteranopia')">daltonico</button>
      </div>

  <div class="acc-seccion">
    <p class="acc-label">Contraste</p>
    <div class="acc-fila">
      <button onclick="toggleContraste()">⬛ Alto contraste</button>
      <button onclick="quitarContraste()">Normal</button>
    </div>
  </div>

  <div class="acc-seccion">
    <p class="acc-label">Calculadora</p>
    <input id="calcDisplay" class="calc-display" type="text" readonly>
    <div class="calc-grid">
      <button onclick="calcInput('7')">7</button>
      <button onclick="calcInput('8')">8</button>
      <button onclick="calcInput('9')">9</button>
      <button onclick="calcInput('/')">÷</button>
      <button onclick="calcInput('4')">4</button>
      <button onclick="calcInput('5')">5</button>
      <button onclick="calcInput('6')">6</button>
      <button onclick="calcInput('*')">×</button>
      <button onclick="calcInput('1')">1</button>
      <button onclick="calcInput('2')">2</button>
      <button onclick="calcInput('3')">3</button>
      <button onclick="calcInput('-')">−</button>
      <button onclick="calcInput('0')">0</button>
      <button onclick="calcInput('.')">.</button>
      <button onclick="calcResult()">=</button>
      <button onclick="calcInput('+')">+</button>
      <button onclick="calcClear()" style="grid-column: 1/-1;">C</button>
    </div>
  </div>

</div>


<div id="toast" class="toast"></div>
<script src="particulas.js"></script>
<script src="app.js"></script>
<script src="flotante.js"></script>

</body>
</html>
