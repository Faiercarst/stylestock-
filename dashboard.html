<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleStock — Dashboard</title>
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="inventario.css">
<link rel="icon" type="image/svg+xml" href="Gemini_Generated_Image_kxv9nskxv9nskxv9.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>


  <svg style="display:none">
  <defs>
    <filter id="deuteranopia">
      <feColorMatrix type="matrix" values="0.625 0.375 0 0 0
                                            0.7   0.3   0 0 0
                                            0     0.3   0.7 0 0
                                            0     0     0   1 0"/>
    </filter>
  </defs>
</svg>

<div class="orb-bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="grid-overlay"></div>
</div>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <img src="logo_text.png" class="brand-img" alt="StyleStock">
      <div class="header-text"  >
        <h1 class="title">Dashboard</h1>
        <div class="header-sub">
         <p class="subtitle">Resumen de tu inventario</p>
         <span class="header-badge">📊 En tiempo real</span>
        </div>
      </div>
    </div>
    <button class="btn-back-inv" onclick="window.location.href='inventario.html'">← Inventario</button>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card kpi-purple">
      <div class="kpi-icon">👕</div>
      <div>
        <div class="kpi-num" id="totalPrendas">—</div>
        <div class="kpi-label">Tipos de prenda</div>
      </div>
    </div>
    <div class="kpi-card kpi-blue">
      <div class="kpi-icon">📦</div>
      <div>
        <div class="kpi-num" id="totalStock">—</div>
        <div class="kpi-label">Unidades en stock</div>
      </div>
    </div>
    <div class="kpi-card kpi-green">
      <div class="kpi-icon">💰</div>
      <div>
        <div class="kpi-num" id="totalValor">—</div>
        <div class="kpi-label">Valor total inventario</div>
      </div>
    </div>
  </div>

  <!-- GRÁFICAS -->
  <div class="charts-row">
    <div class="chart-card">
      <h3>Prendas por categoría</h3>
      <canvas id="chartCategorias"></canvas>
    </div>
    <div class="chart-card">
      <h3>Stock por prenda</h3>
      <canvas id="chartStock"></canvas>
    </div>
  </div>

</div>


<!-- ACCESIBILIDAD -->
<button class="btn-accesibilidad" onclick="toggleAccesibilidad()">♿</button>

<div id="panelAccesibilidad" class="panel-accesibilidad" style="display:none;">
  
  <h3>Accesibilidad</h3>

  <div class="acc-seccion">
    <p class="acc-label">Tamaño de texto</p>
    <div class="acc-fila">
      <button onclick="cambiarTexto(-1)">A−</button>
      <button onclick="cambiarTexto(0)">A</button>
      <button onclick="cambiarTexto(1)">A+</button>
    </div>
  </div>

  <div class="acc-seccion">
    <p class ="acc-label">Modo de color</p>
    <div class="acc-fila">
      <button onclick="aplicarFiltro('')">Normal</button>
      <button onclick="aplicarFiltro('deuteranopia')">daltonico</button>
  </div>

  <div class="acc-seccion">
    <p class="acc-label">Contraste</p>
    <div class="acc-fila">
      <button onclick="toggleContraste()">⬛ Alto contraste</button>
      <button onclick="quitarContraste()">Normal</button>
    </div>
  </div>

  <div class="acc-seccion">
    <p class="acc-label">Calculadora</p>
    <input id="calcDisplay" class="calc-display" type="text" readonly>
    <div class="calc-grid">
      <button onclick="calcInput('7')">7</button>
      <button onclick="calcInput('8')">8</button>
      <button onclick="calcInput('9')">9</button>
      <button onclick="calcInput('/')">÷</button>
      <button onclick="calcInput('4')">4</button>
      <button onclick="calcInput('5')">5</button>
      <button onclick="calcInput('6')">6</button>
      <button onclick="calcInput('*')">×</button>
      <button onclick="calcInput('1')">1</button>
      <button onclick="calcInput('2')">2</button>
      <button onclick="calcInput('3')">3</button>
      <button onclick="calcInput('-')">−</button>
      <button onclick="calcInput('0')">0</button>
      <button onclick="calcInput('.')">.</button>
      <button onclick="calcResult()">=</button>
      <button onclick="calcInput('+')">+</button>
      <button onclick="calcClear()" style="grid-column: 1/-1;">C</button>
    </div>
  </div>

</div>







<div id="toast" class="toast"></div>
<script src="particulas.js"></script>
<script src="app.js"></script>
<script src="flotante.js"></script>
</body>
</html>
