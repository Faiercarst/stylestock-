<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - StyleStock</title>
<link rel="stylesheet" href="registro.css">
<link rel="stylesheet" href="global.css">
</head>
<body>

<div class="container">

    <!-- LADO IZQUIERDO -->
    <div class="left">
        <img src="logo.png" alt="logo">
    </div>

    <!-- LADO DERECHO -->
    <div class="right">
        <div class="card">

            <img src="logo_text.png" class="brand">
            <h1>Crear cuenta</h1>
            <p>Regístrate para comenzar</p>

            <form id="registerForm">

                <div class="input-group">
                    <input type="text" id="nombre" required>
                    <label>Nombre</label>
                </div>

                <div class="input-group">
                    <input type="text" id="apellido" required>
                    <label>Apellido</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" required>
                    <label>Correo electrónico</label>
                </div>

                <div style="position:relative; margin-top:20px;">
                <label style="display:block; font-size:12px; color:#777; margin-bottom:6px;">Contraseña</label>
                <input type="password" id="password" required style="padding-right:40px; width:100%; padding:14px; border-radius:10px; border:1px solid #ccc; font-size:15px;">
                <span id="togglePassword" style="position:absolute; right:12px; bottom:14px; cursor:pointer; font-size:18px;">👀</span>
                </div>

                <button type="submit" class="btn primary">
                    Registrarse
                </button>

                <button type="button" class="btn secondary" onclick="goLogin()">
                    Volver al login
                </button>

            </form>

        </div>
    </div>

</div>

<script src="particulas.js"></script>
<script src="app.js"></script>
</body>
</html>
