<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleStock — Login</title>
<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="global.css">
<link rel="icon" type="image/svg+xml" href="Gemini_Generated_Image_kxv9nskxv9nskxv9.png">
</head>
<body>

 <svg style="display:none">
  <defs>
    <filter id="deuteranopia">
      <feColorMatrix type="matrix" values="0.625 0.375 0 0 0
                                            0.7   0.3   0 0 0
                                            0     0.3   0.7 0 0
                                            0     0     0   1 0"/>
    </filter>
  </defs>
</svg>




<div class="orb-bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="grid-overlay"></div>
</div>

<div class="page">
  <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:440px;">

    <div class="auth-brand">
      <img src="logo_text.png" alt="StyleStock">
    </div>

    <div class="loginCard" id="loginCard">
      <h2>Bienvenido de nuevo</h2>
      <p class="subtitle">Ingresa tus credenciales para continuar</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input id="email" type="email" placeholder="tu@gmail.com" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-with-icon">
            <input id="password" type="password" placeholder="••••••••" required>
            <button type="button" class="eye-btn" id="togglePassword">👀</button>
          </div>
        </div>

        <button type="submit" id="loginBtn">
          <div class="spinner"></div>
          <span class="btn-text">Iniciar sesión</span>
        </button>
      </form>

      <p class="auth-link">
        ¿No tienes cuenta? <span onclick="goRegister()">Regístrate aquí</span>
      </p>
    </div>

  </div>
</div>



<!-- ACCESIBILIDAD -->
<button class="btn-accesibilidad" onclick="toggleAccesibilidad()">♿</button>

<div id="panelAccesibilidad" class="panel-accesibilidad" style="display:none;">
  
  <h3>Accesibilidad</h3>

  <div class="acc-seccion">
    <p class="acc-label">Tamaño de texto</p>
    <div class="acc-fila">
      <button onclick="cambiarTexto(-1)">A−</button>
      <button onclick="cambiarTexto(0)">A</button>
      <button onclick="cambiarTexto(1)">A+</button>
    </div>
  </div>

    <div class="acc-seccion">
      <p class="acc-label">Modo de color</p>
      <div class="acc-fila">
        <button onclick="aplicarFiltro('')">Normal</button>
        <button onclick="aplicarFiltro('deuteranopia')">daltonico</button>
      </div>

  <div class="acc-seccion">
    <p class="acc-label">Contraste</p>
    <div class="acc-fila">
      <button onclick="toggleContraste()">⬛ Alto contraste</button>
      <button onclick="quitarContraste()">Normal</button>
    </div>
  </div>

  <div class="acc-seccion">
    <p class="acc-label">Calculadora</p>
    <input id="calcDisplay" class="calc-display" type="text" readonly>
    <div class="calc-grid">
      <button onclick="calcInput('7')">7</button>
      <button onclick="calcInput('8')">8</button>
      <button onclick="calcInput('9')">9</button>
      <button onclick="calcInput('/')">÷</button>
      <button onclick="calcInput('4')">4</button>
      <button onclick="calcInput('5')">5</button>
      <button onclick="calcInput('6')">6</button>
      <button onclick="calcInput('*')">×</button>
      <button onclick="calcInput('1')">1</button>
      <button onclick="calcInput('2')">2</button>
      <button onclick="calcInput('3')">3</button>
      <button onclick="calcInput('-')">−</button>
      <button onclick="calcInput('0')">0</button>
      <button onclick="calcInput('.')">.</button>
      <button onclick="calcResult()">=</button>
      <button onclick="calcInput('+')">+</button>
      <button onclick="calcClear()" style="grid-column: 1/-1;">C</button>
    </div>
  </div>

</div>

<div id="toast" class="toast"></div>
<script src="flotante.js"></script>
<script src="particulas.js"></script>
<script src="app.js"></script>
</body>
</html>
